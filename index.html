<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>FixIt AI</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d0d0d;color:#f0f0f0;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column}.header{padding:20px 32px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:12px}.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#00e5a0,#00b4d8);display:flex;align-items:center;justify-content:center;font-size:16px}.title{font-size:17px;font-weight:700}.subtitle{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px}.main{flex:1;display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 81px)}.panel{display:flex;flex-direction:column;border-right:1px solid #2a2a2a}.ph{padding:12px 18px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}.lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:600}textarea{flex:1;background:transparent;border:none;outline:none;color:#f0f0f0;font-family:'Courier New',monospace;font-size:14px;line-height:1.7;padding:18px;resize:none;caret-color:#00e5a0}textarea::placeholder{color:#333}.ft{padding:12px 18px;border-top:1px solid #2a2a2a;display:flex;gap:8px}.bc{padding:8px 20px;background:#00e5a0;color:#000;border:none;border-radius:6px;cursor:pointer;font-family:'Courier New',monospace;font-weight:700;font-size:13px}.bc:disabled{background:#333;color:#666;cursor:not-allowed}.bl{padding:8px 14px;background:transparent;color:#666;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px}.op{display:flex;flex-direction:column}.st{display:flex;gap:14px;padding:10px 18px;border-bottom:1px solid #2a2a2a;background:#161616}.si{font-size:11px;color:#666;display:flex;align-items:center;gap:4px}.dt{width:6px;height:6px;border-radius:50%}.sn{font-weight:700;font-size:13px}.oc{flex:1;padding:18px;overflow-y:auto}.ft2{font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word}.pl{color:#333;font-size:13px;line-height:1.8}.df{margin-top:20px;border-top:1px solid #2a2a2a;padding-top:16px}.dl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}.ci{display:flex;gap:8px;margin-bottom:8px;padding:8px 10px;border-radius:6px;background:#1e1e1e;border:1px solid #2a2a2a;align-items:flex-start}.bg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px}.bs{background:#ff4d6d22;color:#ff4d6d;border:1px solid #ff4d6d44}.bg2{background:#ffd16622;color:#ffd166;border:1px solid #ffd16644}.bp{background:#00e5a022;color:#00e5a0;border:1px solid #00e5a044}.wr{color:#ff4d6d;text-decoration:line-through}.ri{color:#00e5a0;font-weight:700}.re{color:#666;font-size:12px}.ne{padding:16px;text-align:center;color:#00e5a0;font-size:13px;margin-top:16px;border:1px solid #00e5a040;border-radius:8px;background:#00e5a010}.lt{font-size:11px;padding:2px 8px;background:#00e5a020;border:1px solid #00e5a040;border-radius:4px;color:#00e5a0}.sp{width:13px;height:13px;border:2px solid #000;border-top:2px solid transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}.cp{padding:8px 14px;background:transparent;color:#666;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;margin-left:auto}</style></head><body><div class="header"><div class="logo">✦</div><div><div class="title">FixIt AI</div><div class="subtitle">Grammar & Spell Checker</div></div></div><div class="main"><div class="panel"><div class="ph"><span class="lbl">Your Text</span><span class="lbl" id="cc">0 chars</span></div><textarea id="inp" placeholder="Type or paste text here...&#10;&#10;Example: I goed to store yestaday."></textarea><div class="ft"><button class="bc" id="btn" onclick="go()">✦ Check</button><button class="bl" onclick="clr()">Clear</button></div></div><div class="op"><div class="ph"><span class="lbl">Fixed Text</span><span class="lt" id="lg" style="display:none"></span></div><div class="st" id="st" style="display:none"><span class="si"><span class="dt" style="background:#ff4d6d"></span><span class="sn" style="color:#ff4d6d" id="s1">0</span>&nbsp;Spelling</span><span class="si"><span class="dt" style="background:#ffd166"></span><span class="sn" style="color:#ffd166" id="s2">0</span>&nbsp;Grammar</span><span class="si"><span class="dt" style="background:#00e5a0"></span><span class="sn" style="color:#00e5a0" id="s3">0</span>&nbsp;Punct.</span></div><div class="oc" id="oc"><div class="pl">Fixed text will appear here.<br><br>Supports English, Hindi, Hinglish, and more.</div></div><div class="ft" id="cf" style="display:none"><button class="cp" id="cpb" onclick="cp()">Copy Fixed Text</button></div></div></div><script>let fx='';document.getElementById('inp').addEventListener('input',function(){document.getElementById('cc').textContent=this.value.length+' chars';});document.getElementById('inp').addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter')go();});async function go(){const i=document.getElementById('inp').value.trim();if(!i)return;const b=document.getElementById('btn');b.disabled=true;b.innerHTML='<span class="sp"></span> Checking...';document.getElementById('oc').innerHTML='<div class="pl">Analyzing...</div>';document.getElementById('st').style.display='none';document.getElementById('lg').style.display='none';document.getElementById('cf').style.display='none';try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Fix ALL grammar and spelling errors. Return ONLY JSON:\n{"fixed":"text","language":"lang","changes":[{"type":"spelling|grammar|punctuation","wrong":"x","right":"y","reason":"z"}]}\n\nTEXT:\n${i}`}]})});const d=await r.json();const t=JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());fx=t.fixed;document.getElementById('lg').textContent=t.language;document.getElementById('lg').style.display='inline';document.getElementById('s1').textContent=t.changes?.filter(c=>c.type==='spelling').length||0;document.getElementById('s2').textContent=t.changes?.filter(c=>c.type==='grammar').length||0;document.getElementById('s3').textContent=t.changes?.filter(c=>c.type==='punctuation').length||0;document.getElementById('st').style.display='flex';let h=`<div class="ft2">${t.fixed}</div>`;if(!t.changes?.length)h+='<div class="ne">✓ No errors!</div>';else{h+=`<div class="df"><div class="dl">Changes (${t.changes.length})</div>`;t.changes.forEach(c=>{h+=`<div class="ci"><span class="bg ${c.type==='spelling'?'bs':c.type==='grammar'?'bg2':'bp'}">${c.type.toUpperCase()}</span><span style="font-size:13px;color:#ccc;line-height:1.5"><span class="wr">${c.wrong}</span><span style="color:#666;margin:0 4px">→</span><span class="ri">${c.right}</span><br><span class="re">${c.reason}</span></span></div>`;});h+='</div>';}document.getElementById('oc').innerHTML=h;document.getElementById('cf').style.display='flex';}catch(e){document.getElementById('oc').innerHTML='<div class="pl" style="color:#ff4d6d">Error. Try again.</div>';}b.disabled=false;b.innerHTML='✦ Check';}function clr(){document.getElementById('inp').value='';document.getElementById('cc').textContent='0 chars';document.getElementById('oc').innerHTML='<div class="pl">Fixed text will appear here.</div>';document.getElementById('st').style.display='none';document.getElementById('lg').style.display='none';document.getElementById('cf').style.display='none';}function cp(){navigator.clipboard.writeText(fx);const b=document.getElementById('cpb');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='Copy Fixed Text',1800);}</script></body></html>
